services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: polymarket-db
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: polymarket-web
    command: python server.py
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      DATABASE_SSLMODE: disable
    env_file: .env

  collector:
    build: .
    container_name: polymarket-collector
    command: python -m services.collector.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      DATABASE_SSLMODE: disable
    env_file: .env

  news-collector:
    build: .
    container_name: polymarket-news-collector
    command: python -m services.news_collector.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      DATABASE_SSLMODE: disable

  feature-store:
    build: .
    container_name: polymarket-feature-store
    command: python -m services.feature_store.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      DATABASE_SSLMODE: disable

  backtester:
    build: .
    container_name: polymarket-backtester
    command: python -m services.backtester.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      DATABASE_SSLMODE: disable

  execution-bot:
    build: .
    container_name: polymarket-execution-bot
    command: python -m services.execution_bot.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://polymarket:polymarket@db:5432/polymarket
      DATABASE_SSLMODE: disable

  prometheus:
    image: prom/prometheus:latest
    container_name: polymarket-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./services/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: polymarket-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus

volumes:
  pgdata:
